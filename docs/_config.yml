title: "Home"
description: ""

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dark"

search: false
markdown: kramdown
permalink: pretty

atom_feed:
  hide: true

collections:
  pages:
    output: true

defaults:
  - scope:
      path: ""
    values:
      layout: single
      custom_head: head/custom.html
      sidebar:
        nav: "sidebar"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
include:
  - assets
  
sidebar:
  - title: "Assignments"
    children:
      - title: "Assignment 1 – Map 1"
        url: /tasks/assignment-1/map-1/
      - title: "Assignment 1 – Map 2"
        url: /tasks/assignment-1/map-2/
      - title: "Assignment 2 – Map 1"
        url: /tasks/assignment-2/map-1/
      - title: "Assignment 2 – Map 2"
        url: /tasks/assignment-2/map-2/
